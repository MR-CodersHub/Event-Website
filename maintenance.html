<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Maintenance | LUMINA</title>
    <meta name="description" content="Lumina is currently undergoing scheduled system maintenance.">
    <link rel="icon" type="image/png" href="images/favicon.png">

    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Outfit:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#C4622D',
                        accent: '#0F172A',
                    },
                    fontFamily: {
                        heading: ['Outfit', 'sans-serif'],
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/account-dropdown.css">
</head>

<body
    class="bg-slate-950 text-white font-sans antialiased overflow-hidden min-h-screen flex flex-col items-center justify-center relative">

    <!-- OVERLAYS -->
    <div class="noise-overlay opacity-30 fixed inset-0 pointer-events-none"></div>
    <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_center,rgba(196,98,45,0.08)_0%,transparent_60%)] pointer-events-none">
    </div>

    <main class="text-center px-6 relative z-10 max-w-2xl mx-auto space-y-12 fade-in-up">

        <!-- Logo -->
        <a href="index.html" class="inline-flex items-center gap-2 justify-center group mb-8">
            <span
                class="bg-primary text-white px-3 py-1 rounded-sm text-xl font-black font-heading group-hover:scale-105 transition-transform">L</span>
            <span
                class="text-3xl font-black tracking-tight uppercase font-heading group-hover:text-primary transition-colors">LUMINA</span>
        </a>

        <div class="space-y-6">
            <div
                class="inline-block border border-primary/30 px-4 py-2 rounded-full mb-4 bg-primary/5 backdrop-blur-sm">
                <span class="w-2 h-2 rounded-full bg-primary inline-block mr-2 animate-pulse"></span>
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-primary">System Offline</span>
            </div>

            <h1 class="text-5xl md:text-7xl font-black font-heading uppercase tracking-tighter leading-none">
                Protocol <br>
                <span
                    class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-orange-400 italic">Maintenance</span>
            </h1>

            <p class="text-slate-400 text-lg md:text-xl font-medium leading-relaxed max-w-lg mx-auto">
                Our digital architecture is undergoing scheduled enhancements to ensure maximum fidelity. Operations
                will resume momentarily.
            </p>
        </div>

        <!-- Progress/Loader -->
        <div class="w-full max-w-xs mx-auto h-1 bg-white/10 rounded-full overflow-hidden relative">
            <div
                class="absolute top-0 left-0 h-full w-1/3 bg-primary rounded-full animate-[progress_2s_ease-in-out_infinite]">
            </div>
        </div>

        <div class="pt-8">
            <p class="text-[10px] text-slate-500 font-bold uppercase tracking-[0.2em]">
                Direct Inquiries: <a href="mailto:ops@lumina.studio"
                    class="text-white hover:text-primary transition-colors border-b border-white/20 hover:border-primary pb-0.5">ops@lumina.studio</a>
            </p>
        </div>

    </main>

    <!-- Custom Keyframe for loader -->
    <style>
        @keyframes progress {
            0% {
                left: -35%;
            }

            50% {
                left: 100%;
            }

            100% {
                left: 100%;
            }
        }
    </style>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script>
        // Simple entry animation
        gsap.from("main", {
            duration: 1.5,
            y: 30,
            opacity: 0,
            ease: "power3.out",
            delay: 0.2
        });
    </script>
    <script src="js/account-dropdown.js"></script>
</body>

</html>
